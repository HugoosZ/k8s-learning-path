server {
    listen 80;
    server_name localhost;

    # El frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Sidecar  
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1; # Solo se puede acceder desde el pod 
        deny all;
    }
}