{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{.Values.appName }}-monitor
  namespace: {{.Values.metrics.serviceMonitor.namespace}} # El ns donde está Prometheus
  labels:
    release: {{.Values.metrics.serviceMonitor.selector}} # Debe coincidir con el nombre que se le asignó al instalador cuando se ejecutó el comando de Helm
spec:
  selector:
    matchLabels:
      app: {{.Values.appName }} # Debe hacer match con el label de frontend
  namespaceSelector:
    matchNames:
      - {{.Values.metrics.serviceMonitor.namespace}} # ns donde está el frontend
  endpoints:
  - port: {{.Values.metrics.serviceMonitor.port}} # El nombre del puerto en el service
    interval: {{.Values.metrics.serviceMonitor.interval}} # Intervalo de recolección
{{- end }}