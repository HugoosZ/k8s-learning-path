apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-service
  labels:
    app: {{ .Values.appName }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.metrics.sidecar.port }}
      targetPort: {{ .Values.metrics.sidecar.port }}
      protocol: TCP
    {{- end }}
  selector:
    app: {{ .Values.appName }}
