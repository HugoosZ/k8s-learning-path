apiVersion: apps/v1 # La version va a cambiar depende del tipo de Recurso (En este caso Deployment)
kind: Deployment
metadata:
  name: {{ .Values.appName}}-deployment
spec:
  replicas: {{ .Values.replicaCount}}
  selector:
    matchLabels:
      app: {{ .Values.appName}}
  template:
    metadata:
      labels:
        app: {{ .Values.appName}}
    spec:
      containers:
        - name: {{ .Values.appName}}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.containerPort }}
        {{- if .Values.metrics.enabled }}
        - name: {{ .Values.metrics.name }}
          image: "{{ .Values.metrics.sidecar.repository }}:{{ .Values.metrics.sidecar.tag }}"
          args:
            - -nginx.scrape-uri={{ .Values.metrics.scrapeUri }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.sidecar.port }}
        {{- end }}
        