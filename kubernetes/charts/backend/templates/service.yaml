apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-service
  labels:
    app: {{ .Values.appName }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
    {{if .Values.metrics.enabled }}
    - name: {{ .Values.metrics.name }} # nombre del puerto 5000
      targetPort: {{ .Values.service.targetPort }} # El puerto de la app con Flask
      port: {{ .Values.service.port }} # Puerto que escucha el Service
    {{end}}
  selector:
    app: {{ .Values.appName }}
