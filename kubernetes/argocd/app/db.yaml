apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: db-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/HugoosZ/k8s-learning-path'
    targetRevision: HEAD
    path: kubernetes/charts/db 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: db
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true