apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus 
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 83.4.0 # La misma versión que ya tengo.
    helm:
      releaseName: prometheus # igual que el NAME de la helm list
      
      # configuraciones (como habilitar Grafana, etc)
      #values: |
        #grafana:
          #enabled: true
          #adminPassword: "password"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false # false por si acaso 
      selfHeal: true