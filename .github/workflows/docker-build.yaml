name: Build and Push Apps

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'kubernetes/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0 #  Cambios entre commits

      # 1. Se detecta qué cambió
      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend: ['src/backend/**', 'kubernetes/charts/backend/**']
            frontend: ['src/frontend/**', 'kubernetes/charts/frontend/**']
            db: ['kubernetes/charts/db/**']

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Solo se ejecuta si hubo cambios en la carpeta de Backend
      - name: Build and push backend
        if: steps.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mi-backend:${{ github.sha }}

      # 3. Solo se ejecuta si hubo cambios en la carpeta de Frontend
      - name: Build and push frontend
        if: steps.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mi-frontend:${{ github.sha }}

      # 4. Actualizacion de los YAMLs 
      - name: Update Helm Values
        run: |
          # Función única para incrementar versiones (version o appVersion)
          bump_key() { #IA
            local file=$1
            local key=$2
            current=$(grep "^$key:" "$file" | awk '{print $2}')
            next=$(echo $current | awk -F. '{$NF = $NF + 1;} 1' OFS=.)
            sed -i "s/^$key: .*/$key: $next/" "$file"
          }

          # Lista de aplicaciones que tienen código fuente (Build + appVersion)
          APPS=("backend" "frontend")
          for APP in "${APPS[@]}"; do
            if [ "${{ steps.changes.outputs[APP] }}" == "true" ]; then
              echo "Actualizando imagen y appVersion para $APP..."
              sed -i "/image:/,/tag:/ s/tag: .*/tag: ${{ github.sha }}/" kubernetes/charts/$APP/values.yaml
              bump_key "kubernetes/charts/$APP/Chart.yaml" "appVersion"
            fi
          done

          # Lista de todos los componentes para subir la versión del Chart (Infra)
          COMPONENTS=("backend" "frontend" "db")
          for COMP in "${COMPONENTS[@]}"; do
             # Nota: Aquí puedes usar una lógica extra para detectar si cambió específicamente el Chart
             if [ "${{ steps.changes.outputs[COMP] }}" == "true" ]; then
                echo "Subiendo versión del Chart para $COMP..."
                bump_key "kubernetes/charts/$COMP/Chart.yaml" "version"
             fi
          done

      # 5. Commit Único
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Hacemos commit solo si hay algo en el 'stage'
          if ! git diff --cached --quiet; then
            git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No hay cambios que subir."
          fi